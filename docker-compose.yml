services:

  db:
    image: postgres:16-alpine
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./secrets/userauth-pass:/run/secrets/userauth-pass:ro
    environment:
      DB_HOST: db
      POSTGRES_DB: userauth
      POSTGRES_USER: userauth
      POSTGRES_PASSWORD_FILE: /run/secrets/userauth-pass
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U userauth"]
      interval: 5s
      timeout: 5s
      retries: 5

  pdf-storage:
    image: minio/minio:RELEASE.2022-10-24T18-35-07Z
    restart: always
    volumes:
      - minio_data:/var/lib/minio_data
      - ./secrets/pdfstore-pass:/run/secrets/pdfstore-pass:ro
    environment:
      MINIO_ENDPOINT: pdf-storage:9000
      MINIO_ROOT_USER: pdfstore
      MINIO_ROOT_PASSWORD_FILE: /run/secrets/pdfstore-pass
      MINIO_BUCKET: user-pdfs
    command: server /var/lib/minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/ready"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    restart: always
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.7.4
    restart: always
    volumes:
      - qdrant_data:/var/lib/qdrant

  redis:
    image: redis:7-alpine
    restart: always
    command: ["redis-server", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  db_init:
    build:
      context: ./app
      dockerfile: ./auth/dockerfile
    restart: "no"
    volumes:
      - ./secrets/userauth-pass:/run/secrets/userauth-pass:ro
    depends_on:
      db:
        condition: service_healthy

  pdf-stor-init:
    build:
      context: ./app
      dockerfile: ./pdf-stor/dockerfile
    restart: "no"
    volumes:
      - ./secrets/pdfstore-pass:/run/secrets/pdfstore-pass:ro
    environment:
      MINIO_ENDPOINT: pdf-storage:9000
      MINIO_ROOT_USER: pdfstore
      MINIO_ROOT_PASSWORD_FILE: /run/secrets/pdfstore-pass
      MINIO_BUCKET: user-pdfs
    depends_on:
      pdf-storage:
        condition: service_healthy

  nginx:
    image: nginx:1.25-alpine
    restart: always
    ports:
      - "8080:8080"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api1
      - api2

  api1:
    build:
      context: ./app
      dockerfile: ./api/dockerfile
    restart: always
    volumes:
      - ./secrets/userauth-pass:/run/secrets/userauth-pass:ro
      - ./secrets/pdfstore-pass:/run/secrets/pdfstore-pass:ro
      - ./secrets/jwt-key:/run/secrets/jwt-key:ro
    environment:
      INSTANCE_ID: api1
      MINIO_ENDPOINT: pdf-storage:9000
      MINIO_ROOT_USER: pdfstore
      MINIO_ROOT_PASSWORD_FILE: /run/secrets/pdfstore-pass
      MINIO_BUCKET: user-pdfs
      RABBITMQ_HOST: rabbitmq
      QDRANT_HOST: qdrant
      QDRANT_PORT: "6333"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      CACHE_TTL: "300"
      EMBEDDING_MODEL: all-MiniLM-L6-v2
    depends_on:
      db:
        condition: service_healthy
      pdf-storage:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  api2:
    build:
      context: ./app
      dockerfile: ./api/dockerfile
    restart: always
    volumes:
      - ./secrets/userauth-pass:/run/secrets/userauth-pass:ro
      - ./secrets/pdfstore-pass:/run/secrets/pdfstore-pass:ro
      - ./secrets/jwt-key:/run/secrets/jwt-key:ro
    environment:
      INSTANCE_ID: api2
      MINIO_ENDPOINT: pdf-storage:9000
      MINIO_ROOT_USER: pdfstore
      MINIO_ROOT_PASSWORD_FILE: /run/secrets/pdfstore-pass
      MINIO_BUCKET: user-pdfs
      RABBITMQ_HOST: rabbitmq
      QDRANT_HOST: qdrant
      QDRANT_PORT: "6333"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      CACHE_TTL: "300"
      EMBEDDING_MODEL: all-MiniLM-L6-v2
    depends_on:
      db:
        condition: service_healthy
      pdf-storage:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  worker1:
    build:
      context: ./app
      dockerfile: ./worker/dockerfile
    restart: always
    volumes:
      - ./secrets/userauth-pass:/run/secrets/userauth-pass:ro
      - ./secrets/pdfstore-pass:/run/secrets/pdfstore-pass:ro
    environment:
      MINIO_ENDPOINT: pdf-storage:9000
      MINIO_ROOT_USER: pdfstore
      MINIO_ROOT_PASSWORD_FILE: /run/secrets/pdfstore-pass
      MINIO_BUCKET: user-pdfs
      RABBITMQ_HOST: rabbitmq
      QDRANT_HOST: qdrant
      QDRANT_PORT: "6333"
      EMBEDDING_MODEL: all-MiniLM-L6-v2
      EMBEDDING_DIMENSION: "384"
      WORKER_ID: worker1
    depends_on:
      db:
        condition: service_healthy
      pdf-storage:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  worker2:
    build:
      context: ./app
      dockerfile: ./worker/dockerfile
    restart: always
    volumes:
      - ./secrets/userauth-pass:/run/secrets/userauth-pass:ro
      - ./secrets/pdfstore-pass:/run/secrets/pdfstore-pass:ro
    environment:
      MINIO_ENDPOINT: pdf-storage:9000
      MINIO_ROOT_USER: pdfstore
      MINIO_ROOT_PASSWORD_FILE: /run/secrets/pdfstore-pass
      MINIO_BUCKET: user-pdfs
      RABBITMQ_HOST: rabbitmq
      QDRANT_HOST: qdrant
      QDRANT_PORT: "6333"
      EMBEDDING_MODEL: all-MiniLM-L6-v2
      EMBEDDING_DIMENSION: "384"
      WORKER_ID: worker2
    depends_on:
      db:
        condition: service_healthy
      pdf-storage:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

volumes:
  postgres_data:
  minio_data:
  qdrant_data:
