services:

  db:
    image: postgres
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./secrets/userauth-pass:/run/secrets/userauth-pass:ro
    ports:
      - "5432:5432"
    environment:
      DB_HOST: db
      POSTGRES_DB: userauth
      POSTGRES_USER: userauth
      POSTGRES_PASSWORD_FILE: /run/secrets/userauth-pass
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U userauth"]
      interval: 5s
      timeout: 5s
      retries: 5

  pdf-storage:
    image: minio/minio:RELEASE.2022-10-24T18-35-07Z
    restart: always
    volumes:
      - minio_data:/var/lib/minio_data
      - ./secrets/pdfstore-pass:/run/secrets/pdfstore-pass:ro
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ENDPOINT: pdf-storage:9000
      MINIO_ROOT_USER: pdfstore
      MINIO_ROOT_PASSWORD_FILE: /run/secrets/pdfstore-pass
      MINIO_BUCKET: user-pdfs
    command: server /var/lib/minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/ready"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    restart: always
    ports:
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.7.4
    restart: always
    volumes:
      - qdrant_data:/var/lib/qdrant

  db_init:
    build:
      context: ./app
      dockerfile: ./user-auth-init/dockerfile
    restart: "no"
    volumes:
      - ./secrets/userauth-pass:/run/secrets/userauth-pass:ro
    depends_on:
      db:
        condition: service_healthy

  pdf-stor-init:
    build:
      context: ./app
      dockerfile: ./pdf-stor-init/dockerfile
    restart: "no"
    volumes:
      - ./secrets/pdfstore-pass:/run/secrets/pdfstore-pass:ro
    environment:
      MINIO_ENDPOINT: pdf-storage:9000
      MINIO_ROOT_USER: pdfstore
      MINIO_ROOT_PASSWORD_FILE: /run/secrets/pdfstore-pass
      MINIO_BUCKET: user-pdfs
    depends_on:
      pdf-storage:
        condition: service_healthy

  api:
    build:
      context: ./app
      dockerfile: ./api/dockerfile
    restart: always
    volumes:
      - ./secrets/userauth-pass:/run/secrets/userauth-pass:ro
      - ./secrets/pdfstore-pass:/run/secrets/pdfstore-pass:ro
      - ./secrets/jwt-key:/run/secrets/jwt-key:ro
    ports:
      - "8080:5000"
    environment:
      MINIO_ENDPOINT: pdf-storage:9000
      MINIO_ROOT_USER: pdfstore
      MINIO_ROOT_PASSWORD_FILE: /run/secrets/pdfstore-pass
      MINIO_BUCKET: user-pdfs
      RABBITMQ_HOST: rabbitmq
      QDRANT_HOST: qdrant
      QDRANT_PORT: "6333"
      EMBEDDING_MODEL: all-MiniLM-L6-v2
    depends_on:
      db:
        condition: service_healthy
      pdf-storage:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  worker:
    build:
      context: ./app
      dockerfile: ./worker/dockerfile
    restart: always
    volumes:
      - ./secrets/userauth-pass:/run/secrets/userauth-pass:ro
      - ./secrets/pdfstore-pass:/run/secrets/pdfstore-pass:ro
    environment:
      MINIO_ENDPOINT: pdf-storage:9000
      MINIO_ROOT_USER: pdfstore
      MINIO_ROOT_PASSWORD_FILE: /run/secrets/pdfstore-pass
      MINIO_BUCKET: user-pdfs
      RABBITMQ_HOST: rabbitmq
      QDRANT_HOST: qdrant
      QDRANT_PORT: "6333"
      EMBEDDING_MODEL: all-MiniLM-L6-v2
      EMBEDDING_DIMENSION: "384"
      WORKER_ID: worker1
    depends_on:
      db:
        condition: service_healthy
      pdf-storage:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

volumes:
  postgres_data:
  minio_data:
  qdrant_data:
