worker_processes auto;
events { worker_connections 2048; }

http {
    upstream api_backend {
        least_conn;
        server api1:5000 max_fails=3 fail_timeout=30s;
        server api2:5000 max_fails=3 fail_timeout=30s;
    }

    # Allow large PDF uploads (spec: 1-50 MB)
    client_max_body_size 100M;
    proxy_connect_timeout 60s;
    proxy_send_timeout    120s;
    proxy_read_timeout    120s;

    log_format main '$remote_addr "$request" $status rt=$request_time '
                    'upstream=$upstream_addr urt=$upstream_response_time';
    access_log /var/log/nginx/access.log main;

    server {
        listen 8080;
        location / {
            proxy_pass http://api_backend;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }
    }
}
